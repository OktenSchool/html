<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        *{
            margin: 0;
        }
        section{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: lightgrey;
        }
        div{
            border: 2px solid;
            width: 300px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        div img{
            width: 200px;
            position: absolute;
            top: -100px;
        }
    </style>
</head>
<body>
    <section>
        <div>
            <img src="https://img.pikbest.com/png-images/20241022/stealth-masked-hacker-gaming-logo-for-gamers_10991543.png!bw700" alt="">
        </div>
    </section>
</body>
</html>
