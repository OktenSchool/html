<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        div{
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('https://png.pngtree.com/thumb_back/fh260/background/20240103/pngtree-vivid-abstract-texture-a-burst-of-colorful-background-image_13892083.png');
            background-size: cover;
        }
        .main{
            font-size: 100px;
            color: cadetblue;
            font-family: Arial;
            font-weight: bold;
            position: relative;
            z-index: 1;
        }
        .shadow{
            font-size: 100px;
            color: rgba(148, 98, 98, 0.5);
            font-family: Arial;
            font-weight: bold;
            position: absolute;
            transform: translate(10px, 6px);
            z-index: 2;
        }
        h2{
            position: relative;
            z-index: -1;
            top: -40px;
            color: coral;
        }
    </style>
</head>
<body>
<div>
    <p class="main">Lorem ipsum dolor sit.</p>
    <p class="shadow">Lorem ipsum dolor sit.</p>
</div>
<h1>Lorem ipsum dolor sit.  </h1>
<h2>Lorem ipsum dolor sit.</h2>
</body>
</html>
