<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        *{
            margin: 0;
            scroll-behavior: smooth;
        }
        header{
            height: 10vh;
            width: 100%;
            background: lightgoldenrodyellow;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        ul{
            list-style-type: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        nav a{
            text-decoration: none;
            color: inherit;
            font-size: 20px;
        }
        .wrapper{
            width: 100%;
            height: 100vh;
        }
        #home{
            background: lightgreen;
        }
        #info{
            background: lightpink;
        }
        #contact{
            background: lightskyblue;
        }
        #about{
            background: lightcoral;
        }
        footer{
            height: 10vh;
            width: 100%;
            background: lightgoldenrodyellow;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#info">Info</a></li>
                <li><a href="#contact">Contact</a></li>
                <li><a href="#about">About</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="wrapper" id="home"></section>
        <section class="wrapper" id="info">
            <a href="#about">about</a>
        </section>
        <section class="wrapper" id="contact"></section>
        <section class="wrapper" id="about"></section>
    </main>
    <footer></footer>
</body>
</html>
